<div class="login-page">
  <div class="login-container">
    <!-- Left Section: Logo & Welcome Message -->
    <div class="welcome-section">
      <div class="logo-wrapper">
        <img src="logo.jpg" alt="Nirvana Resort Logo" class="logo">
      </div>
      <h1 class="welcome-title">Welcome to Nirvana Resort</h1>
      <p class="welcome-subtitle">Staff Management System</p>
      <p class="welcome-text">Manage your team efficiently and effectively</p>
    </div>

    <!-- Right Section: Login Form -->
    <div class="form-section">
      <div class="form-card">
        <h2 class="form-title">Admin Login</h2>
        <p class="form-subtitle">Sign in to your account</p>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" autocomplete="on">
          <div class="form-group">
            <label class="form-label">
              <span class="label-icon">👤</span>
              Username
            </label>
            <input
              type="text"
              class="form-control"
              formControlName="username"
              placeholder="Enter your username"
              autocomplete="username"
              autofocus
              [class.is-invalid]="loginForm.get('username')?.touched && loginForm.get('username')?.invalid"
            />
            <div class="invalid-feedback" *ngIf="loginForm.get('username')?.touched && loginForm.get('username')?.invalid">
              Username is required.
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">
              <span class="label-icon">🔐</span>
              Password
            </label>
            <div class="password-input-group">
              <input
                [type]="showPassword ? 'text' : 'password'"
                class="form-control"
                formControlName="password"
                placeholder="Enter your password"
                autocomplete="current-password"
                [class.is-invalid]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
              />
              <button
                class="password-toggle"
                type="button"
                (click)="togglePassword()"
                [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
              >
                {{ showPassword ? '👁‍🗨' : '🔒' }}
              </button>
            </div>
            <div class="invalid-feedback" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
              Password is required.
            </div>
          </div>

          <div *ngIf="errorMsg" class="alert alert-danger">
            {{ errorMsg }}
          </div>

          <button 
            type="submit"
            class="btn-login" 
            [disabled]="loading || loginForm.invalid"
            [class.loading]="loading"
          >
            <span *ngIf="loading" class="spinner"></span>
            {{ loading ? 'Logging in...' : 'Sign In' }}
          </button>
        </form>

        <div class="form-footer">
          <p class="footer-text">© {{ currentYear }} Nirvana Resort. All rights reserved.</p>
        </div>
      </div>
    </div>
  </div>
</div>
