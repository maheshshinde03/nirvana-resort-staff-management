<div class="app-shell" [class.sidebar-collapsed]="sidebarCollapsed">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark brand-logo">
        <img src="./logo.jpg" alt="Nirvana Resort Logo" />
      </div>
      <div class="brand-text">
        <div class="brand-title">Nirvana Resort</div>
        <div class="brand-subtitle">Staff Management</div>
      </div>
    </div>

    <nav class="nav flex-column mt-3">
      <a class="nav-link" routerLink="/dashboard" routerLinkActive="active">
        <span class="nav-ic" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M10 3H4a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4a1 1 0 0 0-1-1Z" stroke="currentColor"
              stroke-width="1.8" />
            <path d="M20 3h-6a1 1 0 0 0-1 1v4a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4a1 1 0 0 0-1-1Z" stroke="currentColor"
              stroke-width="1.8" />
            <path d="M20 11h-6a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-8a1 1 0 0 0-1-1Z" stroke="currentColor"
              stroke-width="1.8" />
            <path d="M10 14H4a1 1 0 0 0-1 1v5a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-5a1 1 0 0 0-1-1Z" stroke="currentColor"
              stroke-width="1.8" />
          </svg>
        </span>
        <span class="nav-txt">Dashboard</span>
      </a>
      <a class="nav-link" routerLink="/staff" routerLinkActive="active">
        <span class="nav-ic" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" />
            <path d="M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" stroke="currentColor" stroke-width="1.8" />
            <path d="M22 21v-2a4 4 0 0 0-3-3.87" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          </svg>
        </span>
        <span class="nav-txt">Staff</span>
      </a>
      <a class="nav-link" routerLink="/attendance" routerLinkActive="active">
        <span class="nav-ic" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M8 2v3M16 2v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
            <path d="M3 9h18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
            <path d="M6 4h12a3 3 0 0 1 3 3v13a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3V7a3 3 0 0 1 3-3Z" stroke="currentColor"
              stroke-width="1.8" />
            <path d="M8 13l2 2 5-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </span>
        <span class="nav-txt">Attendance</span>
      </a>

      <!-- <a class="nav-link" routerLink="/salary" routerLinkActive="active">
        <span class="nav-ic" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M8 2v3M16 2v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M3 9h18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M6 4h12a3 3 0 0 1 3 3v13a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3V7a3 3 0 0 1 3-3Z" stroke="currentColor" stroke-width="1.8"/>
            <path d="M8 13l2 2 5-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="nav-txt">Salary</span>
      </a> -->
      <a class="nav-link" routerLink="/salary" routerLinkActive="active">
        <span class="nav-ic" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M6 4h12M6 8h12M6 12h5c3 0 5-2 5-4s-2-4-5-4H6" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round" />
            <path d="M10 12l6 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          </svg>
        </span>
        <span class="nav-txt">Salary</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="btn btn-outline-light w-100 side-btn" (click)="logout()" type="button">
        <span class="side-ic" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M10 17l-1 1a2 2 0 0 1-3-1V7a2 2 0 0 1 3-1l1 1" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" />
            <path d="M15 12H7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
            <path d="M15 12l-2-2M15 12l-2 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
              stroke-linejoin="round" />
            <path d="M21 12h-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          </svg>
        </span>
        <span class="side-txt">Logout</span>
      </button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="d-flex align-items-center gap-2 min-width-0">
        <button class="btn btn-outline-secondary btn-sm d-md-none" type="button" (click)="openMobileNav()">
          Menu
        </button>
        <button class="btn btn-outline-secondary btn-sm icon-btn d-none d-md-grid" type="button"
          (click)="toggleSidebar()" [attr.aria-label]="sidebarCollapsed ? 'Expand sidebar' : 'Collapse sidebar'"
          title="Toggle sidebar">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M4 6h16M4 12h10M4 18h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          </svg>
        </button>

        <div class="min-width-0">
          <div class="page-title">Admin Panel</div>
          <div class="muted d-none d-md-block">Manage staff, attendance, and salaries</div>
        </div>
      </div>

      <div class="topbar-right">
        <button class="btn btn-outline-secondary btn-sm icon-btn" type="button" (click)="toggleTheme()"
          [attr.aria-label]="darkMode ? 'Switch to light mode' : 'Switch to dark mode'" title="Toggle dark mode">
          <ng-container *ngIf="!darkMode; else darkIcon">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M12 18a6 6 0 1 0 0-12 6 6 0 0 0 0 12Z" stroke="currentColor" stroke-width="1.8" />
              <path
                d="M12 2v2M12 20v2M4 12H2M22 12h-2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M19.07 4.93l-1.41 1.41M6.34 17.66l-1.41 1.41"
                stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
            </svg>
          </ng-container>
          <ng-template #darkIcon>
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M21 12.8A8.5 8.5 0 0 1 11.2 3a6.5 6.5 0 1 0 9.8 9.8Z" stroke="currentColor" stroke-width="1.8"
                stroke-linejoin="round" />
            </svg>
          </ng-template>
        </button>

        <div class="search d-none d-md-block">
          <span class="search-ic" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M11 19a8 8 0 1 1 0-16 8 8 0 0 1 0 16Z" stroke="currentColor" stroke-width="1.8" />
              <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
            </svg>
          </span>
          <input class="form-control form-control-sm" placeholder="Search…" />
        </div>

        <button class="btn btn-outline-secondary btn-sm icon-btn d-none d-md-grid" type="button"
          aria-label="Notifications">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 7h18s-3 0-3-7Z" stroke="currentColor" stroke-width="1.8"
              stroke-linejoin="round" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          </svg>
        </button>

        <div class="user-pill d-none d-md-inline-flex" title="Admin">
          <span class="user-avatar">A</span>
          <span class="user-name">Admin</span>
        </div>
      </div>
    </div>

    <div class="content p-3">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>

<!-- Mobile Navigation Drawer (no Bootstrap JS required) -->
<div class="mobile-backdrop" *ngIf="mobileNavOpen" (click)="closeMobileNav()"></div>
<aside class="mobile-drawer" [class.open]="mobileNavOpen" aria-label="Mobile navigation">
  <div class="mobile-drawer-header">
    <div>
      <div class="mobile-drawer-title">Nirvana Resort</div>
      <div class="mobile-drawer-subtitle">Staff Management</div>
    </div>
    <button class="btn btn-outline-secondary btn-sm" type="button" (click)="closeMobileNav()">Close</button>
  </div>

  <nav class="nav flex-column mt-2">
    <a class="nav-link" routerLink="/dashboard" routerLinkActive="active" (click)="closeMobileNav()">
      <span class="nav-ic" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M10 3H4a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4a1 1 0 0 0-1-1Z" stroke="currentColor"
            stroke-width="1.8" />
          <path d="M20 3h-6a1 1 0 0 0-1 1v4a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4a1 1 0 0 0-1-1Z" stroke="currentColor"
            stroke-width="1.8" />
          <path d="M20 11h-6a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-8a1 1 0 0 0-1-1Z" stroke="currentColor"
            stroke-width="1.8" />
          <path d="M10 14H4a1 1 0 0 0-1 1v5a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-5a1 1 0 0 0-1-1Z" stroke="currentColor"
            stroke-width="1.8" />
        </svg>
      </span>
      <span class="nav-txt">Dashboard</span>
    </a>
    <a class="nav-link" routerLink="/staff" routerLinkActive="active" (click)="closeMobileNav()">
      <span class="nav-ic" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" />
          <path d="M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" stroke="currentColor" stroke-width="1.8" />
          <path d="M22 21v-2a4 4 0 0 0-3-3.87" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
        </svg>
      </span>
      <span class="nav-txt">Staff</span>
    </a>
    <a class="nav-link" routerLink="/attendance" routerLinkActive="active" (click)="closeMobileNav()">
      <span class="nav-ic" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M8 2v3M16 2v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          <path d="M3 9h18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          <path d="M6 4h12a3 3 0 0 1 3 3v13a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3V7a3 3 0 0 1 3-3Z" stroke="currentColor"
            stroke-width="1.8" />
          <path d="M8 13l2 2 5-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
      </span>
      <span class="nav-txt">Attendance</span>
    </a>

      <a class="nav-link" routerLink="/salary" routerLinkActive="active" (click)="closeMobileNav()">
        <span class="nav-ic" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M6 4h12M6 8h12M6 12h5c3 0 5-2 5-4s-2-4-5-4H6" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round" />
            <path d="M10 12l6 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          </svg>
        </span>
        <span class="nav-txt">Salary</span>
      </a>
      
  </nav>

  <div class="mobile-drawer-footer">
    <button class="btn btn-outline-danger w-100" (click)="logout()">Logout</button>
  </div>
</aside>
