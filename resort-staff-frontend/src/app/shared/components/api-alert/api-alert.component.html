<div class="notification-container" *ngIf="state$ | async as note">
  <div class="notification" [ngClass]="'notification-' + note.type">
    <div class="notification-content">
      <div class="notification-icon">
        <svg *ngIf="note.type === 'success'" viewBox="0 0 24 24" fill="none">
          <path d="M20 6L9 17L4 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <svg *ngIf="note.type === 'error'" viewBox="0 0 24 24" fill="none">
          <path d="M12 8v4m0 4v.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <svg *ngIf="note.type === 'info'" viewBox="0 0 24 24" fill="none">
          <path d="M12 8v4m0 4v.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <svg *ngIf="note.type === 'warning'" viewBox="0 0 24 24" fill="none">
          <path d="M12 8v4m0 4v.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="notification-message">{{ note.message }}</div>
      <button class="notification-close" (click)="dismiss()" type="button" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>
</div>
